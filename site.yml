---
- hosts: all
  become: true
  pre_tasks:

  - name: install updates (Rocky)
    dnf:
      update_only: yes
      update_cache: yes
    when: ansible_distribution == "Rocky"

  - name: install updates (Linux Mint)
    apt:
      upgrade: dist
      update_cache: yes
    when: ansible_distribution == "Linux Mint"


- hosts: web_servers
  become: true
  tasks:

  - name: install apache and php packages for Linux Mint server
    apt:
      name:
        - apache2
        - libapache2-mod-php
      state: latest
    when: ansible_distribution == "Linux Mint"

  - name: install apache and php packages for Rocky Linux server
    dnf:
      name:
        - httpd
        - php
      state: latest
    when: ansible_distribution == "Rocky"
